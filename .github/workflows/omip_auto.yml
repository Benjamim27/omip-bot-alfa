name: Run Bot OMIP

on:
  workflow_dispatch: # Botão manual "Run workflow"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests

      # Garante que o ficheiro JSON existe antes do script rodar
      - name: Garantir existência do histórico
        run: |
          if [ ! -f historico_omip.json ]; then
            echo "{}" > historico_omip.json
          fi

      # Executa o teu script.py
      - name: Executar o Script
        run: python script.py

      # 🛡️ SISTEMA ANTIFALHA DO GIT: Só faz commit se o ficheiro tiver mudado mesmo
      - name: Guardar Histórico Atualizado
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add historico_omip.json
          
          # Verifica se há alterações reais no ficheiro antes de tentar o commit
          if git diff --staged --quiet; then
            echo "💤 Sem alterações no histórico. Nada para guardar."
          else
            git commit -m "💾 [Bot] Histórico de preços OMIP atualizado [skip ci]"
            git push
            echo "💾 Histórico atualizado e guardado no GitHub!"
          fi
