name: Execucao Diaria OMIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Mantemos o teu token no checkout para ele preparar o repositório com escrita
          token: ${{ secrets.MEU_GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Força o Git a reconhecer o repositório como seguro dentro da máquina virtual
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git add ultima_data.txt
          git commit -m "Data atualizada [skip ci]" || exit 0
          
          # CORREÇÃO DO URL: Removido o ".git" do meio do caminho e ajustada a sintaxe do token
          git push https://${{ secrets.MEU_GITHUB_TOKEN }}@github.com/Benjamim27/omip-bot-alfa.git HEAD:main
