name: Execucao Diaria OMIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Evita problemas de propriedade de pastas no Linux
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # CORREÇÃO AQUI: Agora guarda o histórico em JSON
          git add historico_omip.json
          
          # Se não houver alterações, o script para aqui sem dar erro
          git commit -m "🤖 Histórico JSON atualizado [skip ci]" || exit 0
          
          # Push para guardar o ficheiro na nuvem
          git push origin HEAD:main
