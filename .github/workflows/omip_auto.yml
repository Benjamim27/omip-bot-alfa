name: Execucao Diaria OMIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Usa o teu token pessoal logo no início do processo
          token: ${{ secrets.MEU_GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add ultima_data.txt
          git commit -m "Data atualizada [skip ci]" || exit 0
          
          # Usamos o teu token pessoal autenticado para forçar o push sem falhas
          git push https://x-access-token:${{ secrets.MEU_GITHUB_TOKEN }}@github.com/Benjamim27/omip-bot-alfa.git main
