name: Execucao Diaria OMIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Isto garante que o checkout usa direitos totais desde o início
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add ultima_data.txt
          git commit -m "Data atualizada [skip ci]" || exit 0
          
          # Removido o push simples que dava erro 403
          # Usamos o token embutido para forçar a autenticação no push
          git push https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/Benjamim27/omip-bot-alfa.git main
