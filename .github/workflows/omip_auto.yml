name: Run Bot OMIP

on:
  workflow_dispatch: # Botão manual "Run workflow"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests

      # Garante que o ficheiro JSON existe para não quebrar a primeira leitura
      - name: Garantir existência do histórico
        run: |
          if [ ! -f historico_omip.json ]; then
            echo "{}" > historico_omip.json
          fi

      # 🎯 CORRIGIDO: Agora aponta para script.py que é o nome real no teu GitHub
      - name: Executar o Script
        run: python script.py

      # Guarda o histórico atualizado no teu repositório
      - name: Guardar Histórico Atualizado
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add historico_omip.json
          git commit -m "💾 [Bot] Histórico de preços OMIP atualizado" || echo "Sem alterações para fazer commit"
          git push || echo "Sem alterações para fazer push"
