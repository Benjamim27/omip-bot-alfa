name: Execucao Diaria OMIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Usamos o token nativo do GitHub. Não precisas de criar este secret!
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Evita problemas de propriedade de pastas no Linux
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git add ultima_data.txt
          
          # Se não houver alterações na data, o script para aqui sem dar erro
          git commit -m "Data atualizada [skip ci]" || exit 0
          
          # Push nativo e direto usando o token que configurámos no checkout
          git push origin HEAD:main
