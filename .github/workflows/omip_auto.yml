name: Executar Bot OMIP

# AGORA APENAS ATIVA POR DISPARO MANUAL OU VIA API (CRON-JOB.ORG)
on:
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Executar o Script Python
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }} 
      run: python script.py  

    - name: Guardar histórico JSON caso tenha mudado
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -f historico_omip.json ]; then
          git add historico_omip.json
          git commit -m "🤖 Histórico JSON atualizado [skip ci]" || true
          git push || true
        fi
