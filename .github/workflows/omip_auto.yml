name: Execucao Diaria OMIP

on:
  workflow_dispatch:

# ESTA É A CHAVE: Dá autorização total ao robô para fazer o 'git push'
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # Atualizado para v4 (Node.js 24)

      - name: Python Setup
        uses: actions/setup-python@v5  # Atualizado para v5 (Node.js 24)
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
        run: python script.py

      - name: Save Date
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add ultima_data.txt
          git commit -m "Data atualizada [skip ci]" || exit 0
          git push
